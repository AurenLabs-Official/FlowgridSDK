name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (MSRV)
        run: cargo check -p flowgrid --all-features

  feature-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - --no-default-features --features openai
          - --no-default-features --features anthropic
          - --no-default-features --features openai,files
          - --no-default-features --features openai,webhooks
          - --no-default-features --features openai,azure
          - --no-default-features --features openai,realtime
          - --no-default-features --features anthropic,batches
          - --no-default-features --features anthropic,beta
          - --no-default-features --features openai,stream-types
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (feature matrix)
        run: cargo check -p flowgrid ${{ matrix.features }}
