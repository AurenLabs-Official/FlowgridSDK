name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  llm-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt (workspace)
        run: cargo fmt --all -- --check
      - name: clippy (workspace, -D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test (workspace)
        run: cargo test --workspace

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy -p flowgrid --features full -- -D warnings
      - name: test
        run: cargo test -p flowgrid --features full
      - name: check examples
        run: cargo check -p flowgrid --examples --features full
      - name: check (OpenTelemetry metrics feature)
        run: cargo check -p flowgrid --no-default-features --features "openai,anthropic,tls-rustls,opentelemetry"

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: contract tests only
        run: cargo test -p flowgrid --features full contract_

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny
        run: cargo deny check
      - name: Note (reqwest)
        run: echo "supply-chain includes HTTP client crates (e.g. reqwest) via flowgrid-ui; advisories are tracked in deny.toml"
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (MSRV)
        run: |
          cargo check -p flowgrid --features full
          cargo check -p flowgrid-serve
          cargo check -p flowgrid-ui
          cargo check -p flowgrid-cli

  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-semver-checks
        run: cargo +stable install cargo-semver-checks --locked
      - name: Generate current rustdoc JSON (full features, single TLS)
        run: cargo +nightly rustdoc -p flowgrid --features full -Z unstable-options -- -Z unstable-options --output-format json
      - name: Semver checks (committed baseline)
        run: cargo +stable semver-checks check-release -p flowgrid --baseline-rustdoc crates/flowgrid/semver/baseline_rustdoc.json --current-rustdoc target/doc/flowgrid.json

  windows-smoke:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: target/win-full
      CARGO_BUILD_JOBS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test (flowgrid, full, isolated target dir)
        run: cargo test -p flowgrid --features full -j 1

  feature-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - --no-default-features --features minimal
          - --no-default-features --features openai,tls-rustls,enterprise
          - --no-default-features --features openai,tls-rustls
          - --no-default-features --features anthropic,tls-rustls
          - --no-default-features --features openai,tls-rustls,files
          - --no-default-features --features openai,tls-rustls,webhooks
          - --no-default-features --features openai,tls-rustls,azure
          - --no-default-features --features openai,tls-rustls,realtime
          - --no-default-features --features anthropic,tls-rustls,batches
          - --no-default-features --features anthropic,tls-rustls,beta
          - --no-default-features --features openai,tls-rustls,stream-types
          - --no-default-features --features anthropic,tls-rustls,stream-types
          - --no-default-features --features openai,anthropic,tls-native,stream-types
          - --no-default-features --features openai,tls-rustls,cancel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (feature matrix)
        run: cargo check -p flowgrid ${{ matrix.features }}
