# Cargo-deny configuration (CI: `cargo deny check`).
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# Transitive only — see [docs/advisory-supply-chain.md](docs/advisory-supply-chain.md) for quarterly review.
ignore = [
    # burn-core 0.13 + workspace pin `=2.0.0-rc.3`; no maintained bincode 2 line per advisory.
    { id = "RUSTSEC-2025-0141", reason = "Transitive bincode 2.0.0-rc.3 via burn-core; pinned for Burn 0.13 API." },
    # burn-dataset -> gix-tempfile -> gitoxide stack; upgrade blocked on Burn release.
    { id = "RUSTSEC-2025-0021", reason = "Transitive gix-features via burn-dataset; no Burn bump in this workspace yet." },
    { id = "RUSTSEC-2024-0350", reason = "Transitive gix-fs via burn-dataset; no Burn bump in this workspace yet." },
    # tokenizers -> indicatif -> number_prefix (unmaintained; upstream choice).
    { id = "RUSTSEC-2025-0119", reason = "Transitive number_prefix via tokenizers/indicatif." },
    # tokenizers -> paste (archived; upstream choice).
    { id = "RUSTSEC-2024-0436", reason = "Transitive paste via tokenizers." },
]

[bans]
multiple-versions = "warn"

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"
